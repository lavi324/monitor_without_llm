                return;
            }

            const baseText = `${searchMatchedLogs.length} match${searchMatchedLogs.length !== 1 ? 'es' : ''} found`;
            if (currentLogFilterLevel === 'all') {
                resultsCount.textContent = baseText;
                return;
            }

            resultsCount.textContent = `${baseText} (${filteredLogs.length} shown)`;
        }

        function applyLogViewFilters(options = {}) {
            const searchMatchedLogs = getSearchMatchedLogs(allFetchedLogs, currentLogSearchTerm);
            const availableLevels = getLogLevelSet(searchMatchedLogs);

            if (currentLogFilterLevel !== 'all' && !availableLevels.has(currentLogFilterLevel)) {
                currentLogFilterLevel = 'all';
            }

            visibleFetchedLogs = currentLogFilterLevel === 'all'
                ? searchMatchedLogs
                : searchMatchedLogs.filter(log => String(log.level || 'info').toLowerCase() === currentLogFilterLevel);

            updateFilterOptions(availableLevels);
            updateSearchResultsCount(searchMatchedLogs, visibleFetchedLogs);

            scheduleLogViewportRender(true);

            if (options.scrollToNewest) {
                scrollLogsToNewest();
            } else if (options.scrollToTop) {
                scrollLogsToTop();
            }
        }

        function highlightLogMessage(messageText, searchTerm) {
            const escapedText = escapeHtml(messageText);
            if (!searchTerm) {
                return escapedText;
            }

            const escapedSearchTerm = searchTerm.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const regex = new RegExp(`(${escapedSearchTerm})`, 'gi');
            return escapedText.replace(regex, '<mark style="background: #ffeb3b; padding: 0 2px; border-radius: 2px;">$1</mark>');
        }

        function renderLogs(logs, requestedCount = currentRequestedLogCount) {
            const container = document.getElementById('logsContainer');

            if (!logs || logs.length === 0) {
                updateFilterOptions(new Set());
                allFetchedLogs = [];
                visibleFetchedLogs = [];
                container.classList.remove('pre-fetch-hidden');
                container.classList.remove('expanded');
                container.innerHTML = '<div class="no-logs">No logs found</div>';
                return;
            }

            container.classList.add('expanded');

            // Ensure frontend shows exactly the requested newest rows whenever available.
            const sortedLogs = sortLogsOldestFirst(Array.isArray(logs) ? logs : []);
            const normalizedRequested = Number.isFinite(requestedCount) && requestedCount > 0
                ? requestedCount
                : sortedLogs.length;
            const effectiveLogs = sortedLogs.length > normalizedRequested
                ? sortedLogs.slice(sortedLogs.length - normalizedRequested)
                : sortedLogs;

            allFetchedLogs = effectiveLogs.map((log, index) => ({ ...log, __sourceIndex: index }));
            applyLogViewFilters({ resetMeasurement: true, scrollToNewest: true });
        }

        function renderFetchedLogsSummary() {
            return '';
        }

        function renderLogPage(force = false) {
            const container = document.getElementById('logsContainer');
            if (!container) return;

            container.classList.toggle('pre-fetch-hidden', allFetchedLogs.length === 0 && currentRequestedLogCount === 0);
            container.classList.toggle('expanded', allFetchedLogs.length > 0);

            if (!visibleFetchedLogs.length) {
                const emptyMessage = allFetchedLogs.length
                    ? 'No logs match the current search or filter.'
                    : 'No logs found';
                container.innerHTML = `<div class="no-logs">${emptyMessage}</div>${renderFetchedLogsSummary()}`;
                updateExportFetchedBtnVisibility();
                return;
            }

            const rangeKey = `${visibleFetchedLogs.length}:${currentLogFilterLevel}:${currentLogSearchTerm}`;
            if (!force && rangeKey === lastRenderedLogRangeKey) {
                return;
            }

            lastRenderedLogRangeKey = rangeKey;

            const streamText = visibleFetchedLogs.map((log) => {
                const timestamp = formatLogTimestamp(log.timestamp || '');
                const level = String(log.level || 'info').toUpperCase();
                const message = String(log.message || '');
                return `${timestamp} ${level} ${message}`;
            }).join('\n');

            container.innerHTML = `
                <pre class="log-stream">${highlightLogMessage(streamText, currentLogSearchTerm)}</pre>
                ${renderFetchedLogsSummary()}
            `;

            const errorLevelFilter = document.getElementById('errorLevelFilter');
            if (errorLevelFilter) {
                errorLevelFilter.style.display = 'block';
            }

            const searchLogsGroup = document.getElementById('searchLogsGroup');
            if (searchLogsGroup) {
                searchLogsGroup.style.display = 'flex';
            }

            updateFilterOptions(getLogLevelSet(getSearchMatchedLogs(allFetchedLogs, currentLogSearchTerm)));
            updateVisibleLogDiagnoseButtons();

            const exportFetchedBtn = document.getElementById('exportFetchedBtn');
            if (exportFetchedBtn) {
                exportFetchedBtn.dataset.available = '1';
                initExportFetchedBtnScrollBehavior();
                updateExportFetchedBtnVisibility();
            }
        }

        function searchInLogs() {
            const searchInput = document.getElementById('searchLogsInput');
            currentLogSearchTerm = searchInput.value.trim().toLowerCase();
            applyLogViewFilters({ scrollToTop: true });
        }

        function clearLogSearch() {
            const searchInput = document.getElementById('searchLogsInput');
            searchInput.value = '';
            searchInLogs(); // This will reset and show all
        }

        async function diagnoseLogErrorRow(sourceIndex) {
            return;
        }

        function exportCurrentLogs() {
            const serviceName = document.getElementById('modalServiceName').textContent || 'service';
            let exportText = '========================================\n';
            exportText += `SERVICE LOGS EXPORT - ${serviceName}\n`;
            exportText += `Export Date: ${new Date().toISOString()}\n`;
            exportText += '========================================\n\n';
            if (!allFetchedLogs.length) {
                exportText += 'No logs to export.\n';
            } else {
                allFetchedLogs.forEach(log => {
                    const ts = formatLogTimestamp(log.timestamp || '');
                    const level = String(log.level || 'info').toUpperCase();
                    const msg = String(log.message || '').trim();
                    const flow = String(log.flowId || '').trim();
                    exportText += `[${ts}] [${level}] ${msg}\n`;
                    if (flow) exportText += `  Flow ID: ${flow}\n`;
                    exportText += '\n';
                });
            }
            exportText += `${'='.repeat(80)}\nEND OF EXPORT\n${'='.repeat(80)}\n`;
            const blob = new Blob([exportText], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${serviceName}-logs-${new Date().toISOString().replace(/[:]/g,'-')}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function filterLogsByLevel(level) {
            const filterButtons = document.querySelectorAll('.filter-badge, .filter-badge-all');
            
            // Update active button states
            filterButtons.forEach(btn => {
                const btnLevel = btn.getAttribute('data-level');
                if ((level === 'all' && btn.classList.contains('filter-badge-all')) ||
                    (level !== 'all' && btnLevel === level)) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            currentLogFilterLevel = level;
            applyLogViewFilters({ scrollToTop: true });
        }

        function updateFilterOptions(levels) {
            const filter = document.getElementById('errorLevelFilter');
            if (!filter) return;

            const hasLevels = levels && levels.size > 0;
            filter.style.display = hasLevels ? 'block' : 'none';

            const buttons = filter.querySelectorAll('.filter-badge');
            let activeStillVisible = currentLogFilterLevel === 'all';
            buttons.forEach(btn => {
                const level = btn.getAttribute('data-level');
                const visible = levels.has(level);
                btn.style.display = visible ? '' : 'none';
                if (visible && level === currentLogFilterLevel) {
                    activeStillVisible = true;
                }
            });

            // If the currently active level is no longer available, reset to All
            if (!activeStillVisible) {
                const filterButtons = document.querySelectorAll('.filter-badge, .filter-badge-all');
                filterButtons.forEach(btn => {
                    const btnLevel = btn.getAttribute('data-level');
                    btn.classList.toggle('active', !btnLevel);
                });
            }
        }

        document.getElementById('logCount').addEventListener('input', validateTimeRangeAndToggleFetch);

        document.getElementById('nodeSelector').addEventListener('change', async function() {
            const nextNode = this.value;
            console.log('[nodeSelector] Changed to:', nextNode);
            
            // Stop usage polling when switching\n            stopUsagePolling();
            
            // Abort in-flight requests immediately
            if (fetchAbortController) {
                try { fetchAbortController.abort(); } catch {}
            }
            
            // Clear guard
            window.__isFetchingData = false;
            
            // Clear any stored node name from previous modal views
            delete window.__logsNodeName;
            
            // Update node
            currentNodeName = nextNode;
            console.log('[nodeSelector] Set currentNodeName to:', currentNodeName);
            
            // If switching to homepage (no node), show UI immediately
            if (!currentNodeName) {
                // Pause auto-refresh
                if (refreshInterval) clearInterval(refreshInterval), refreshInterval = null;
                
                // Show homepage UI instantly - hide usage stats since no node selected
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                document.querySelector('.section').style.display = 'none';
                document.getElementById('usageStats').style.display = 'none';
                document.querySelector('.messages-section').style.display = 'block';
                document.getElementById('exportControl').style.display = 'none';
                document.getElementById('error').classList.remove('show');
                // Hide the healthy/unhealthy dropdown — every entry here is already unhealthy.
                const fsLabel = document.getElementById('filterStatusLabel');
                if (fsLabel) fsLabel.style.display = 'none';
                const messageNodeFilterLabel = document.getElementById('messageNodeFilterLabel');
                if (messageNodeFilterLabel) messageNodeFilterLabel.style.display = '';
                
                // Fetch data in background without blocking
                setTimeout(() => fetchData(), 0);
                
                // Resume auto-refresh
                refreshInterval = setInterval(fetchData, 5000);
            } else {
                // Pause auto-refresh
                if (refreshInterval) clearInterval(refreshInterval), refreshInterval = null;
                
                allServices = [];
                document.getElementById('error').classList.remove('show');
                // Keep content visible, just show a subtle loading indicator
                document.getElementById('content').style.display = 'block';
                document.getElementById('loading').style.display = 'none';
                // Update section visibility - show usage stats when node selected
                document.querySelector('.section').style.display = 'block';
                document.getElementById('usageStats').style.display = 'flex';
                document.querySelector('.messages-section').style.display = 'none';
                document.getElementById('exportControl').style.display = 'block';
                // Re-show the healthy/unhealthy dropdown for per-node views.
                const fsLabel = document.getElementById('filterStatusLabel');
                if (fsLabel) fsLabel.style.display = '';
                const messageNodeFilterLabel = document.getElementById('messageNodeFilterLabel');
                if (messageNodeFilterLabel) messageNodeFilterLabel.style.display = 'none';
                // Clear services container to show it's loading
                document.getElementById('servicesContainer').innerHTML = '<div class="loading" style="display:block; color:#555;">Loading Services<span class="ai-thinking-dots"></span></div>';
                
                try {
                    await fetchData();
                } catch (err) {
                    console.error('Switch error:', err);
                }
                
                // Resume auto-refresh
                refreshInterval = setInterval(fetchData, 5000);
            }
        });

        document.getElementById('filterStatus').addEventListener('change', renderServices);

        document.getElementById('messageNodeFilter').addEventListener('change', () => {
            if (!currentNodeName) {
                renderMessages(latestMessages);
            }
        });

        document.getElementById('searchInput').addEventListener('input', () => {
            // The search input is shared between the per-node services view and
            // the unhealthy services view. Re-render whichever is visible.
            if (currentNodeName) {
                renderServices();
            } else {
                renderMessages(latestMessages);
            }
        });

        // Close modal on outside click
        document.getElementById('logsModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeLogsModal();
            }
        });

        function toggleServiceSelection(checkbox) {
            const serviceId = checkbox.dataset.serviceId;
            const serviceName = checkbox.dataset.serviceName;
            
            if (checkbox.checked) {
                selectedServices.add(JSON.stringify({id: serviceId, name: serviceName}));
            } else {
                selectedServices.delete(JSON.stringify({id: serviceId, name: serviceName}));
            }

            if (selectedServices.size > 0) {
                hideExportSelectionHint();
            }
        }

        function showExportSelectionHint() {
            const hint = document.getElementById('exportHint');
            if (!hint) return;
            if (exportHintTimeout) {
                clearTimeout(exportHintTimeout);
            }
            hint.style.display = 'block';
            exportHintTimeout = setTimeout(() => {
                hideExportSelectionHint();
            }, 5000);
        }

        function hideExportSelectionHint() {
            const hint = document.getElementById('exportHint');
            if (!hint) return;
            if (exportHintTimeout) {
                clearTimeout(exportHintTimeout);
                exportHintTimeout = null;
            }
            hint.style.display = 'none';
        }

        function validateExportInputs() {
            let allValid = true;
            selectedServices.forEach(serviceStr => {
                const service = JSON.parse(serviceStr);
                const input = document.getElementById(`logs-count-${service.id}`);
                const errorDiv = document.querySelector(`.export-error-msg-${service.id}`);
                const value = parseInt(input.value);
                
                if (isNaN(value) || value < 1) {
                    errorDiv.textContent = `Please enter a number between 1 and ${MAX_LOG_ROWS.toLocaleString()}`;
                    errorDiv.style.display = 'block';
                    allValid = false;
                } else if (value > MAX_LOG_ROWS) {
                    errorDiv.textContent = `⚠️ Maximum ${MAX_LOG_ROWS.toLocaleString()} logs allowed`;
                    errorDiv.style.display = 'block';
                    allValid = false;
                } else {
                    errorDiv.style.display = 'none';
                }
            });
            
            // Update export button state
            const exportButton = document.getElementById('performExportBtn');
            if (exportButton) {
                exportButton.disabled = !allValid;
                exportButton.style.opacity = allValid ? '1' : '0.5';
                exportButton.style.cursor = allValid ? 'pointer' : 'not-allowed';
            }
            
            return allValid;
        }

        function openExportModal() {
            if (selectedServices.size === 0) {
                showExportSelectionHint();
                return;
            }
            hideExportSelectionHint();
            
            const config = document.getElementById('exportConfig');
            config.innerHTML = '';
            
            selectedServices.forEach(serviceStr => {
                const service = JSON.parse(serviceStr);
                config.innerHTML += `
                    <div class="export-service-item">
                        <div class="export-service-name">${service.name}</div>
                        <div class="export-service-controls">
                            <label>Number of latest logs:</label>
                            <input type="number" id="logs-count-${service.id}" value="100" min="1" max="${MAX_LOG_ROWS}" />
                            <span class="export-limit-hint" style="font-size: 12px; color: #999; margin-left: 10px;">Max: ${MAX_LOG_ROWS.toLocaleString()}</span>
                        </div>
                        <div class="export-error-msg-${service.id}" style="color: #f44336; font-size: 12px; margin-top: 5px; display: none; font-weight: 600;"></div>
                    </div>
                `;
            });
            
            // Add input validation listeners
            selectedServices.forEach(serviceStr => {
                const service = JSON.parse(serviceStr);
                const input = document.getElementById(`logs-count-${service.id}`);
                input.addEventListener('input', validateExportInputs);
                input.addEventListener('change', validateExportInputs);
            });
            
            // Initial validation
            validateExportInputs();
            
            document.getElementById('exportModal').classList.add('show');
        }

        function closeExportModal() {
            document.getElementById('exportModal').classList.remove('show');
        }

        async function performExport() {
            // Validate before exporting
            if (!validateExportInputs()) {
                return;
            }
            
            const exportButton = document.getElementById('performExportBtn');
            exportButton.disabled = true;
            exportButton.textContent = 'Exporting...';
            
            try {
                let exportText = '========================================\n';
                exportText += 'SERVICE LOGS EXPORT\n';
                exportText += `Export Date: ${new Date().toISOString()}\n`;
                exportText += '========================================\n\n';
                let hasErrors = false;
                
                for (const serviceStr of selectedServices) {
                    const service = JSON.parse(serviceStr);
                    const logCount = parseInt(document.getElementById(`logs-count-${service.id}`).value);
                    
                    exportText += `\n${'='.repeat(80)}\n`;
                    exportText += `SERVICE: ${service.name}\n`;
                    exportText += `${'='.repeat(80)}\n\n`;
                    
                    try {
                        const response = await fetch(`${API_URL}/logs/${service.id}?nodeName=${currentNodeName}&type=latest&count=${logCount}`);
                        
                        if (!response.ok) {
                            const errorData = await response.json();
                            if (response.status === 400 && errorData.error && errorData.error.includes('exceeds maximum')) {
                                exportText += `ERROR: Log count exceeds maximum limit of ${errorData.maxLimit || MAX_LOG_ROWS} logs.\n`;
                                hasErrors = true;
                            } else {
                                exportText += `Error fetching logs: ${errorData.error || 'Unknown error'}\n`;
                                hasErrors = true;
                            }
                        } else {
                            const logs = await response.json();
                            
                            if (logs.length === 0) {
                                exportText += 'No logs available for this service.\n';
                            } else {
                                exportText += `Exported ${logs.length} log(s):\n\n`;
                                logs.forEach(log => {
                                    const timestamp = new Date(log.timestamp).toLocaleString();
                                    exportText += `[${timestamp}] [${log.level.toUpperCase()}] ${log.message}\n`;
                                    if (log.flowId) {
                                        exportText += `  Flow ID: ${log.flowId}\n`;
                                    }
                                    exportText += '\n';
                                });
                            }
                        }
                    } catch (err) {
                        exportText += `Error fetching logs: ${err.message}\n`;
                        hasErrors = true;
                    }
                }
                
                exportText += `\n${'='.repeat(80)}\n`;
                exportText += hasErrors ? 'EXPORT COMPLETED WITH ERRORS\n' : 'END OF EXPORT\n';
                exportText += `${'='.repeat(80)}\n`;
                
                // Create and download file
                const blob = new Blob([exportText], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `service-logs-export-${new Date().toISOString().split('T')[0]}.txt`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                // Clear selected services and uncheck all checkboxes
                selectedServices.clear();
                document.querySelectorAll('.service-checkbox').forEach(checkbox => {
                    checkbox.checked = false;
                });
                
                closeExportModal();
            } catch (err) {
                alert('Error exporting logs: ' + err.message);
            } finally {
                exportButton.disabled = false;
                exportButton.textContent = 'Export to File';
            }
        }

        // Close modal on outside click
        document.getElementById('exportModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeExportModal();
            }
        });

        // Show UI immediately - no blocking
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        document.getElementById('error').classList.remove('show');
        
        // Show messages section on initial load (no node selected)
        document.querySelector('.section').style.display = 'none';
        document.querySelector('.messages-section').style.display = 'block';
        document.getElementById('exportControl').style.display = 'none';
        // Hide usage stats on initial load (no node selected)
        document.getElementById('usageStats').style.display = 'none';
        // Hide the healthy/unhealthy dropdown on initial load \u2014 unhealthy view is the default.
        const _fsLabelInit = document.getElementById('filterStatusLabel');
        if (_fsLabelInit) _fsLabelInit.style.display = 'none';
        const _messageNodeFilterLabelInit = document.getElementById('messageNodeFilterLabel');
        if (_messageNodeFilterLabelInit) _messageNodeFilterLabelInit.style.display = '';
        
        updateFavicon();

        // Load nodes list (fast - doesn't block)
        loadNodes();
        
        // Fetch messages immediately - use cached response if available
        fetch(API_URL + '/messages')
            .then(resp => resp.ok ? resp.json() : [])
            .then(renderMessages)
            .catch(e => console.error('Initial messages error:', e));
        
        // Auto-refresh every 5 seconds
        refreshInterval = setInterval(fetchData, 5000);
    </script>
</body>
</html>
